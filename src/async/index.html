<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Platzi Store</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 0;
        line-height: 1.4;
        color: #111;
      }
      .container {
        width: min(960px, 92vw);
        margin: 0 auto;
        padding: 24px 0;
      }
      header {
        border-bottom: 1px solid #eee;
        background: #fff;
        position: sticky;
        top: 0;
      }
      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: #111;
      }
      .links {
        display: flex;
        gap: 12px;
      }
      .links a {
        text-decoration: none;
        color: #111;
      }
      .hero {
        padding: 28px 0;
      }
      .hero h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      .hero p {
        margin: 0;
        color: #444;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }
      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      .card {
        border: 1px solid #eee;
        border-radius: 14px;
        padding: 14px;
        background: #fff;
        overflow: hidden;
      }
      .card h3 {
        margin: 10px 0 6px;
        font-size: 16px;
      }
      .price {
        font-weight: 700;
        margin: 0;
      }
      .muted {
        color: #555;
      }
      .section-title {
        margin: 24px 0 10px;
        font-size: 18px;
      }
      .product-image {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        border-radius: 12px;
        background: #f4f4f4;
        display: block;
      }
      footer {
        border-top: 1px solid #eee;
        padding: 22px 0;
        color: #555;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="container nav">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <strong>Platzi Store</strong>
        </div>

        <nav class="links" aria-label="Navegación">
          <a href="#productos">Productos</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>Platzi Store</h1>
        <p>Productos desde una API usando fetch + async/await.</p>
      </section>

      <section id="productos">
        <h2 class="section-title">Productos</h2>
        <p class="muted" id="status"></p>
        <div class="grid" id="grid-productos"></div>
      </section>
    </main>

    <footer>
      <div class="container">
        <small>Todos los Izquierdos Reservados.</small>
      </div>
    </footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
